    <!-- Contact Form -->
  <div class="contact-form">
  <h2><span>Send</span> Us <span>a</span> Message</h2>
  <form id="whatsappForm">
    <div class="input-group">
      <i class="fas fa-user"></i>
      <input type="text" id="name" required>
      <label for="name"><span>Your</span> Name</label>
    </div>

    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="email" required>
      <label for="email"><span>Your</span> Email</label>
    </div>

    <div class="input-group">
      <i class="fas fa-comment-dots"></i>
      <textarea id="message" required></textarea>
      <label for="message"><span>Your</span> Message</label>
    </div>

    <button type="submit">Send via WhatsApp</button>
  </form>
</div>

<!-- Javascript Code -->
<script>
  document.getElementById("whatsappForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();

   const whatsappMessage = `Hello Heaven Bite Pizza!',%0AName: ${name}%0AEmail: ${email}%0AMessage: ${message}`;
    const phoneNumber = "9360827631"; // Replace with your actual WhatsApp number

    window.open(`https://wa.me/${phoneNumber}?text=${whatsappMessage}`, "_blank");
  });
   </script>
